<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minuteurs multi-examens — Haut-Lac</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.card{background:#fff;border-radius:16px;border:1px solid #e0ddd6;padding:2rem;width:100%;max-width:1100px;position:relative}
body.is-fullscreen{background:#fff;padding:0;overflow:hidden;height:100vh;width:100vw;align-items:center;justify-content:center}
body.is-fullscreen .card{border:none;border-radius:0;max-width:none;width:100vw;height:100vh;overflow-y:auto;padding:1.2rem 2vw;display:flex;flex-direction:column;justify-content:center}

/* Top bar */
.top-bar{position:absolute;top:16px;right:16px;display:none;gap:8px;align-items:center;z-index:10}
.top-bar.visible{display:flex}
.top-btn{background:none;border:1px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#666;display:flex;align-items:center;gap:6px;font-family:inherit;transition:background .12s}
.top-btn:hover{background:#f5f4f0}
.top-btn.active{background:#eaf1fb;border-color:#3a7bd5;color:#1a4a8a}
.quit-btn{position:fixed;bottom:20px;right:20px;z-index:50;background:none;border:1px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#999;display:none;align-items:center;gap:6px;font-family:inherit;transition:background .12s,color .12s,border-color .12s}
.quit-btn:hover{background:#fdf0f0;border-color:#e0a0a0;color:#a03030}
.quit-btn.visible{display:flex}
.icon{width:15px;height:15px;vertical-align:-2px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;display:inline-block;flex-shrink:0}

/* Live clock */
#live-clock{font-size:40px;font-weight:600;font-family:'Arial','Helvetica Neue',sans-serif;font-variant-numeric:normal;color:#1a1a18;letter-spacing:-1.5px;line-height:1;margin-bottom:1rem}
body.is-fullscreen #live-clock{}

/* ── SETUP ── */
h1{font-size:20px;font-weight:500;color:#1a1a18;margin-bottom:1.5rem}
.section-title{font-size:13px;color:#666;margin-bottom:8px;font-weight:500}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px}
input[type=text],input[type=number]{padding:8px 12px;border:1px solid #d0cdc6;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1a18;background:#fff;outline:none;width:100%}
input[type=text]:focus,input[type=number]:focus{border-color:#3a7bd5}
.reading-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid #e0ddd6;border-radius:10px;background:#fafaf8;cursor:pointer;user-select:none;transition:border-color .15s,background .15s;margin-bottom:1.1rem}
.reading-row.on{border-color:#3a7bd5;background:#eaf1fb}
.reading-left{display:flex;flex-direction:column;gap:2px}
.reading-name{font-size:14px;font-weight:500;color:#1a1a18}
.reading-row.on .reading-name{color:#1a4a8a}
.reading-sub{font-size:12px;color:#999}
.reading-row.on .reading-sub{color:#3a7bd5}
.reading-controls{display:flex;align-items:center;gap:8px}
.reading-input{width:58px;padding:5px 8px;border:1px solid #d0cdc6;border-radius:6px;font-size:14px;font-family:inherit;text-align:center;color:#1a1a18;background:#fff;outline:none}
.reading-input:disabled{opacity:.35;cursor:not-allowed}
.reading-input-label{font-size:12px;color:#888}
.sw{width:36px;height:20px;border-radius:99px;background:#ccc;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer}
.sw.on{background:#3a7bd5}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.sw.on::after{transform:translateX(16px)}
.option-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #e0ddd6;border-radius:10px;background:#fafaf8;cursor:pointer;user-select:none;margin-bottom:1.1rem;transition:border-color .15s,background .15s}
.option-row:hover{background:#f0ede8}
.option-row-text{flex:1}
.option-row-label{font-size:14px;font-weight:500;color:#1a1a18}
.option-row-sub{font-size:12px;color:#999;margin-top:1px}
.exam-list{display:flex;flex-direction:column;gap:12px;margin-bottom:1.1rem}
.exam-card{border:1px solid #e0ddd6;border-radius:12px;padding:14px 16px;background:#fafaf8}
.exam-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.exam-card-num{font-size:12px;font-weight:600;color:#3a7bd5;letter-spacing:.04em;}
.exam-card-remove{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;font-family:inherit;transition:color .12s}
.exam-card-remove:hover{color:#a03030}
.time-row{display:flex;gap:8px;margin-bottom:10px}
.time-row .field{flex:1;margin-bottom:0}
.time-row .field label{font-size:12px}
.extra-toggles{display:flex;gap:8px;flex-wrap:wrap}
.extra-toggle{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #e0ddd6;border-radius:8px;background:#fff;cursor:pointer;user-select:none;font-size:13px;color:#666;transition:border-color .15s,background .15s,color .15s}
.extra-toggle.on{border-color:#3a7bd5;background:#eaf1fb;color:#1a4a8a}
.extra-toggle .sw-sm{width:28px;height:16px;border-radius:99px;background:#ccc;position:relative;flex-shrink:0;transition:background .2s}
.extra-toggle.on .sw-sm{background:#3a7bd5}
.extra-toggle .sw-sm::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s}
.extra-toggle.on .sw-sm::after{transform:translateX(12px)}
.add-exam-btn{width:100%;padding:10px;border:1px dashed #c0bdb6;border-radius:10px;background:none;cursor:pointer;font-size:14px;color:#888;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .12s,color .12s,background .12s;margin-bottom:1.1rem}
.add-exam-btn:hover{border-color:#3a7bd5;color:#3a7bd5;background:#f0f6ff}
.alert-row{display:flex;align-items:center;gap:12px;margin-bottom:1.1rem}
.alert-row label{font-size:13px;color:#666;white-space:nowrap}
.start-btn{width:100%;padding:13px;border:none;border-radius:8px;background:#3a7bd5;color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:8px}
.start-btn:hover{background:#2d62b8}
.start-btn:disabled{background:#b0b0b0;cursor:not-allowed}

/* ── TIMER VIEW ── */
#timer-view{display:none}
#timer-view.active{display:block;width:100%}
#exam-section{display:none;width:100%}
.exams-columns{display:flex;gap:0;align-items:stretch;--cs:1}
.exam-col{flex:1;padding:0 16px;border-right:1px solid #f0ede8;min-width:0;display:flex;flex-direction:column}
.exam-col:first-child{padding-left:0}
.exam-col:last-child{border-right:none;padding-right:0}
.exam-col-title{font-size:calc(20px * var(--cs));font-weight:600;color:#1a1a18;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0ede8}

/* Waiting state */
.col-waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px 0;gap:12px}
.col-waiting-label{font-size:12px;color:#bbb;letter-spacing:.05em}
.col-start-btn{padding:10px 18px;border:none;border-radius:8px;background:#3a7bd5;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background .12s}
.col-start-btn:hover{background:#2d62b8}

/* Reading phase in column */
.col-reading-phase{background:#fffbeb;border:1px solid #f5d87a;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.col-reading-label{font-size:10px;font-weight:600;color:#a07000;letter-spacing:.05em;margin-bottom:4px}
.col-reading-disp{font-size:calc(32px * var(--cs));font-weight:600;font-family:'Arial',sans-serif;font-variant-numeric:normal;color:#6b4b00;letter-spacing:-1px;line-height:1}
.col-reading-disp.warning{color:#7b1a1a}

.timer-block{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid #f8f6f2}
.timer-block:last-of-type{border-bottom:none}
.timer-block.done-blk{opacity:.4}
.t-label{font-size:10px;color:#aaa;margin-bottom:1px;letter-spacing:.04em;font-weight:500}
.t-display{font-size:calc(40px * var(--cs));font-weight:600;font-family:'Arial','Helvetica Neue',sans-serif;font-variant-numeric:normal;color:#1a1a18;letter-spacing:-1.5px;line-height:1}
.t-display.near30{color:#1a5abf}
.t-display.warning{color:#c0392b}
.t-display.done-txt{color:#ccc}
.t-display.greyed{color:#aaa}
.t-total{font-size:11px;color:#ccc;margin-top:2px}
.done-badge{display:inline-block;font-size:9px;font-weight:600;background:#e8e6e0;color:#999;border-radius:99px;padding:2px 7px;margin-left:5px;vertical-align:2px}
.milestones{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.ms-item{font-size:10px;color:#bbb;display:flex;align-items:center;gap:4px;line-height:1.4;white-space:nowrap}
.ms-item strong{font-weight:600}
.ms-item.ms-30{color:#5580c0}
.ms-item.ms-5{color:#b07a50}
.ms-item.ms-end{color:#999}
.ms-item.ms-passed{opacity:.45;text-decoration:line-through}
.ms-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.col-controls{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:10px}
/* Speaking indicator */
.speaking-dot{
  position:absolute;top:-4px;right:-4px;
  width:20px;height:20px;border-radius:50%;
  background:#3a7bd5;color:#fff;
  font-size:11px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
  animation:speakPulse 1s ease-in-out infinite;
}
.speaking-dot.active{opacity:1;}
@keyframes speakPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
.ib-type-select{width:100%;padding:6px 8px;border:1px solid #d0cdc6;border-radius:7px;font-size:13px;font-family:inherit;color:#1a1a18;background:#fff;outline:none;margin-top:6px}
.ib-type-select:focus{border-color:#3a7bd5}
.ib-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:#eaf1fb;color:#1a4a8a;margin-left:6px;vertical-align:2px}

.divider{height:1px;background:#e8e6e0;margin:1rem 0}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl-btn{padding:7px 13px;border:1px solid #d0cdc6;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#1a1a18;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .12s}
.ctrl-btn:hover{background:#f5f4f0}
.ctrl-btn.primary{background:#3a7bd5;color:#fff;border-color:#3a7bd5}
.ctrl-btn.primary:hover{background:#2d62b8}
.ctrl-btn.green{background:#27ae60;color:#fff;border-color:#27ae60}
.ctrl-btn.green:hover{background:#219a52}

/* ── SIDE PANEL ── */
.side-panel{position:fixed;top:0;right:-420px;width:400px;max-width:95vw;height:100vh;background:#fff;border-left:1px solid #e0ddd6;box-shadow:-4px 0 24px rgba(0,0,0,.08);z-index:200;display:flex;flex-direction:column;transition:right .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.side-panel.open{right:0}
.side-panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid #f0ede8;flex-shrink:0}
.side-panel-title{font-size:16px;font-weight:600;color:#1a1a18}
.side-panel-close{background:none;border:none;cursor:pointer;color:#aaa;font-size:22px;line-height:1;padding:2px 6px;border-radius:4px;transition:color .12s}
.side-panel-close:hover{color:#333}
.panel-tabs{display:flex;border-bottom:1px solid #f0ede8;flex-shrink:0}
.panel-tab{flex:1;padding:10px 6px;font-size:13px;font-weight:500;color:#999;background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.panel-tab.active{color:#3a7bd5;border-bottom-color:#3a7bd5}
.panel-tab:hover:not(.active){color:#666}
.panel-body{flex:1;overflow-y:auto;padding:16px 20px}

/* Adjust tab */
.adj-exam-section{margin-bottom:1.2rem}
.adj-exam-title{font-size:13px;font-weight:600;color:#3a7bd5;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f0ede8}
.adj-timer-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f8f6f2;gap:8px}
.adj-timer-row:last-of-type{border-bottom:none}
.adj-timer-label{font-size:13px;font-weight:500;color:#1a1a18;flex:1;min-width:0}
.adj-timer-live{font-size:13px;color:#999;font-family:'Arial',sans-serif;font-variant-numeric:normal;min-width:50px;text-align:right;flex-shrink:0}
.adj-btns{display:flex;gap:3px;flex-shrink:0}
.adj-btn{height:26px;padding:0 7px;border:1px solid #d0cdc6;border-radius:5px;background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:#444;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .1s;white-space:nowrap}
.adj-btn:hover{background:#f0ede8}

/* Add exam tab */
.panel-section-title{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;letter-spacing:.04em;}
.panel-field{margin-bottom:9px}
.panel-field label{display:block;font-size:12px;color:#888;margin-bottom:3px}
.panel-field input{padding:7px 10px;font-size:13px}
.panel-time-row{display:flex;gap:7px;margin-bottom:9px}
.panel-time-row .panel-field{flex:1;margin-bottom:0}
.panel-reading-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid #e0ddd6;border-radius:9px;background:#fafaf8;cursor:pointer;user-select:none;margin-bottom:10px;transition:border-color .15s,background .15s}
.panel-reading-row.on{border-color:#3a7bd5;background:#eaf1fb}
.panel-reading-name{font-size:13px;font-weight:500;color:#1a1a18}
.panel-reading-row.on .panel-reading-name{color:#1a4a8a}
.panel-reading-ctrls{display:flex;align-items:center;gap:6px}
.panel-reading-inp{width:48px;padding:4px 6px;border:1px solid #d0cdc6;border-radius:5px;font-size:13px;font-family:inherit;text-align:center;color:#1a1a18;background:#fff;outline:none}
.panel-reading-inp:disabled{opacity:.35;cursor:not-allowed}
.panel-reading-label{font-size:11px;color:#888}
.panel-divider{height:1px;background:#f0ede8;margin:12px 0}
.panel-confirm-btn{width:100%;padding:10px;border:none;border-radius:8px;background:#3a7bd5;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s}
.panel-confirm-btn:hover{background:#2d62b8}
.panel-confirm-btn:disabled{background:#b0b0b0;cursor:not-allowed}
</style>
</head>
<body>
<div class="card">
  <div class="top-bar" id="top-bar">
    <button class="top-btn" id="settings-top-btn" onclick="togglePanel()">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span id="ui-settings-btn">Réglages</span>
    </button>
    <button class="top-btn" onclick="toggleFullscreen()">
      <svg class="icon" id="fullscreen-icon" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <span id="fullscreen-label">Plein écran</span>
    </button>
  </div>

  <button class="quit-btn" id="quit-btn" onclick="confirmQuit()">
    <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    <span id="ui-quit">Quitter</span>
  </button>

  <div id="live-clock" style="display:none"></div>

  <!-- SETUP -->
  <div id="setup-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h1 style="margin-bottom:0" id="ui-title">Minuteurs multi-examens</h1>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button id="uilang-fr" onclick="setUILang('fr')"
          style="padding:4px 11px;border-radius:7px;border:1px solid #3a7bd5;background:#3a7bd5;color:#fff;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600">FR</button>
        <button id="uilang-en" onclick="setUILang('en')"
          style="padding:4px 11px;border-radius:7px;border:1px solid #d0cdc6;background:#fff;color:#888;cursor:pointer;font-size:12px;font-family:inherit">EN</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border:1px solid #e8e0c8;border-radius:10px;background:#fffbe6;margin-bottom:1rem">
      <span class="reading-name" id="ui-reading-name" style="color:#7a6000;font-size:13px;font-weight:600;flex-shrink:0">Temps de lecture</span>
      <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
        <input type="number" class="reading-input" id="inp-reading" min="1" max="60" value="5" oninput="updateReadingSub()">
        <span class="reading-input-label" style="font-size:13px;color:#888">min</span>
      </div>
    </div>
    <div style="font-size:11px;color:#aaa;margin-top:-10px;margin-bottom:1rem;padding-left:2px" id="reading-sub">Activez par épreuve ci-dessous</div>
    <div class="section-title" id="ui-exams-section">Examens</div>
    <div class="exam-list" id="exam-list"></div>
    <button class="add-exam-btn" onclick="addExam()">
      <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="ui-add-exam">Ajouter un examen</span>
    </button>
    <div class="section-title" id="ui-alerts-section" style="margin-bottom:8px">Alertes sonores</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1.1rem">
      <div style="display:flex;align-items:center;gap:10px">
        <label style="font-size:13px;color:#666;white-space:nowrap;flex:1" id="ui-alert30-label">Première alerte avant la fin</label>
        <input type="number" id="inp-alert30" min="1" max="180" value="30" style="width:64px;flex-shrink:0" oninput="ALERT_30=alert30Enabled?(parseInt(this.value)||30)*60:0;savePrefs()">
        <span style="font-size:13px;color:#888;flex-shrink:0">min</span>
        <div class="sw on" id="sw-alert30" onclick="toggleAlert30()" style="flex-shrink:0"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <label style="font-size:13px;color:#666;white-space:nowrap;flex:1" id="ui-alert5-label">Deuxième alerte avant la fin</label>
        <input type="number" id="inp-alert" min="0" max="120" value="5" style="width:64px;flex-shrink:0" oninput="alertSecs=alert5Enabled?(parseInt(this.value)||5)*60:0;savePrefs()">
        <span style="font-size:13px;color:#888;flex-shrink:0">min</span>
        <div class="sw on" id="sw-alert5" onclick="toggleAlert5()" style="flex-shrink:0"></div>
      </div>
      <!-- Logo -->
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #f0ede8">
        <div style="flex:1">
          <div style="font-size:13px;color:#666" id="ui-logo-label">Logo dans les cercles</div>
          <div style="font-size:11px;color:#aaa;margin-top:2px">JPG, PNG ou SVG</div>
        </div>

// ── CLOCK ──
function nowClock(){const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());}
function fmtClockAt(s){const t=new Date(Date.now()+s*1000);return pad(t.getHours())+':'+pad(t.getMinutes());}
function tickClock(){const el=document.getElementById('live-clock');if(el&&el.style.display!=='none')el.textContent=nowClock();}

// ── HELPERS ──
function pad(n){return String(n).padStart(2,'0');}
function fmtTime(s){if(s<0)s=0;const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+':'+pad(m)+':'+pad(sc):pad(m)+':'+pad(sc);}
function fmtHuman(s){if(s<=0)return'0 min';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;if(h>0&&m>0)return h+'h'+pad(m);if(h>0)return h+'h';if(m>0&&sc>0)return m+' min '+sc+' s';if(m>0)return m+' min';return sc+' s';}
// Spoken form of a timer label like "+25%" or "+1/3" for TTS
function fmtSpokenLabel(label, fr){
  if(!label)return label;
  const s=label.replace(/^\+/,'').trim();
  // Fraction like "1/3", "1/4", "2/3"
  const fracMatch=s.match(/^(\d+)\/(\d+)$/);
  if(fracMatch){
    const n=parseInt(fracMatch[1]), d=parseInt(fracMatch[2]);
    if(fr){
      const dFr={2:'demi',3:'tiers',4:'quart',5:'cinquième',6:'sixième',8:'huitième',10:'dixième'};
      const denom=dFr[d]||(d+'ième');
      const plural=n>1&&d>2?'s':'';
      return n===1?denom:n+' '+denom+plural;
    } else {
      const dEn={2:'half',3:'third',4:'quarter',5:'fifth',6:'sixth',8:'eighth',10:'tenth'};
      const denom=dEn[d]||(d+'th');
      const plural=n>1&&d>2?'s':'';
      return n===1?denom:n+' '+denom+plural;
    }
  }
  // Percentage like "25%" or "33.3%"
  const pctMatch=s.match(/^([\d.]+)%$/);
  if(pctMatch){
    const v=parseFloat(pctMatch[1]);
    const vStr=Number.isInteger(v)?String(v):(fr?String(v).replace('.',','):String(v));
    return fr?vStr+' pour cent':vStr+' percent';
  }
  return label; // fallback
}
function fmtSpoken(s,fr=true){
  if(s<=0)return fr?'zéro minute':'zero minutes';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(fr){
    if(h>0&&m>0)return h+(h>1?' heures':' heure')+' '+m+(m>1?' minutes':' minute');
    if(h>0)return h+(h>1?' heures':' heure');
    return m+(m>1?' minutes':' minute');
  } else {
    if(h>0&&m>0)return h+(h>1?' hours':' hour')+' '+m+(m>1?' minutes':' minute');
    if(h>0)return h+(h>1?' hours':' hour');
    return m+(m>1?' minutes':' minute');
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function milestonesHTML(t){
  if(t.done)return'';
  const l=t.left;let h='';
  const fr=announceLang==='fr';
  // First alert (30 min by default, configurable)
  if(alert30Enabled&&ALERT_30>0){
    const at30=l-ALERT_30;
    const lbl='−'+Math.round(ALERT_30/60)+' min';
    if(at30>0)h+=`<div class="ms-item ms-30"><span class="ms-dot"></span>${lbl} → <strong>${fmtClockAt(at30)}</strong></div>`;
    else h+=`<div class="ms-item ms-30 ms-passed"><span class="ms-dot"></span>${lbl} ${fr?'passé':'past'}</div>`;
  }
  // Second alert (5 min by default, configurable)
  if(alert5Enabled&&alertSecs>0){
    const at5=l-alertSecs;
    const lbl='−'+Math.round(alertSecs/60)+' min';
    if(at5>0)h+=`<div class="ms-item ms-5"><span class="ms-dot"></span>${lbl} → <strong>${fmtClockAt(at5)}</strong></div>`;
    else if(l>0)h+=`<div class="ms-item ms-5 ms-passed"><span class="ms-dot"></span>${lbl} ${fr?'passé':'past'}</div>`;
  }
  if(l>0)h+=`<div class="ms-item ms-end"><span class="ms-dot"></span>${fr?'Fin':'End'} → <strong>${fmtClockAt(l)}</strong></div>`;
  return`<div class="milestones" id="ms-${t.id}">${h}</div>`;
}

// IB exam type labels for display
const IB_TYPE_LABELS={
  ns:{fr:'Non-structuré',en:'Non-structured'},
  ss:{fr:'Structuré/semi-structuré',en:'Structured/semi-structured'},
  mcq:{fr:'QCM',en:'Multiple choice'},
  acq:{fr:'Acquisition de langues',en:'Language acquisition'}
};

// ── IB ANNOUNCEMENTS TABLE ──
// null = no announcement for this event/type
// Functions receive (exam, lang, now) where now=Date object at trigger time
function ibText(type, event, lang, exam, now, timer){
  const fr=lang==='fr';
  // Use specific timer duration if provided, otherwise principal
  const timerForDur=timer||exam.timers.find(ti=>ti.label==='Principal');
  const dur=fmtSpoken(timerForDur?.total||0,fr);
  const isExtra=timer&&timer.label!=='Principal';
  const heure=now?(now.getHours()+(fr?' heures ':' hours ')+now.getMinutes().toString().padStart(2,'0')):'';
  const heureEn=now?(now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes()):'';

  if(event==='readingStart'){
    if(type==='mcq')return null;
    return fr
      ?"Vous pouvez à présent ouvrir votre épreuve d'examen. Votre temps de lecture commence maintenant."
      :"You may now open your examination paper. Your reading time starts now.";
  }

  if(event==='readingEnd'){
    if(type==='mcq')return null;
    return fr
      ?`Le temps de lecture est terminé. Vous avez ${dur} pour cette épreuve d'examen. Vous pouvez commencer à écrire. Il est ${heure}.`
      :`Your reading time is over. You have ${dur} for this examination paper. You may start to write. The time now is ${heureEn}.`;
  }

  if(event==='examStart'){
    if(type!=='mcq')return null;
    return fr
      ?`Vous pouvez commencer à écrire. Il est ${heure}.`
      :`You may now start the examination. The time now is ${heureEn}.`;
  }

  if(event==='alert30'){
    if(type==='acq')return null;
    return fr?"Il vous reste 30 minutes.":"The time remaining is 30 minutes.";
  }

  if(event==='alert5'){
    if(type==='acq')return null;
    if(type==='ns')
      return fr
        ?"Il vous reste cinq minutes. Assurez-vous de rayer d'un trait toute partie de votre travail que vous ne voulez pas voir prise en compte lors de la notation. Si cela s'applique à la totalité d'une question, n'oubliez pas de noircir la case contenant le numéro de la question."
        :"The time remaining is five minutes. Please ensure you draw a line through any work that you do not wish to be marked; if this applies to a whole question, remember to fill in the relevant question number box as well.";
    if(type==='ss')
      return fr
        ?"Il vous reste cinq minutes. Assurez-vous de rayer d'un trait toute partie de votre travail que vous ne voulez pas voir prise en compte lors de la notation."
        :"The time remaining is 5 minutes. Please ensure you draw a line through any work that you do not wish to be marked.";
    if(type==='mcq')
      return fr?"Il vous reste cinq minutes.":"The time remaining is five minutes.";
    return null;
  }

  if(event==='end'){
    return fr
      ?"L'épreuve est terminée. Veuillez arrêter d'écrire immédiatement. Il ne vous est pas permis d'ajouter quoi que ce soit à vos réponses ni de les modifier."
      :"The examination has ended. Please stop writing immediately. Do not make any additions or amendments to your answers.";
  }

  return null;
}

// Group announcements by text. For events that include duration (readingEnd),
// group per-timer so extra-time candidates get the correct duration announced.
// Returns array of {text, exams[], timerLabel} where timerLabel is null for exam-level events.
function ibGroupAnnouncements(examList, event, now){
  const groups={}; // text → {exams:[], timerLabel, timerIds:[]}
  const durationEvents=['readingEnd']; // events where timer duration matters

  examList.forEach(exam=>{
    if(durationEvents.includes(event)){
      // Fire once per active timer so each duration is announced correctly
      exam.timers.filter(t=>!t.done).forEach(timer=>{
        const text=ibText(exam.ibType||'ns', event, announceLang, exam, now, timer);
        if(!text)return;
        const key=text+'||'+timer.label; // group by text+timerLabel
        if(!groups[key])groups[key]={text,items:[],timerLabel:timer.label};
        groups[key].items.push({exam,timer});
      });
    } else {
      const text=ibText(exam.ibType||'ns', event, announceLang, exam, now);
      if(!text)return;
      if(!groups[text])groups[text]={text,items:[],timerLabel:null};
      groups[text].items.push({exam,timer:null});
    }
  });

  return Object.values(groups).map(g=>({
    text:g.text,
    exams:[...new Set(g.items.map(i=>i.exam))],
    timers:g.items.map(i=>i.timer).filter(Boolean),
    timerLabel:g.timerLabel
  }));
}

function ibBuildAnnouncement(group, allRunningExams){
  const fr=announceLang==='fr';
  const allTimers=allRunningExams.flatMap(e=>e.timers.filter(t=>!t.done));
  // If this group covers all active timers → no prefix needed
  const groupTimerCount=group.timers.length||group.exams.length;
  const totalActive=group.timerLabel
    ? allTimers.filter(t=>t.label===group.timerLabel).length // same timer type across exams
    : allRunningExams.length;

  if(groupTimerCount>=totalActive) return group.text;

  // Build prefix with exam names and extra-time label if applicable
  const parts=group.exams.map(e=>{
    if(group.timerLabel&&group.timerLabel!=='Principal'){
      return fr
        ?`${e.title||('Épreuve '+e.id)}, temps supplémentaire de ${fmtSpokenLabel(group.timerLabel,true)}`
        :`${e.title||('Exam '+e.id)}, additional time of ${fmtSpokenLabel(group.timerLabel,false)}`;
    }
    return e.title||('Épreuve '+e.id);
  });
  const list=joinList(parts,fr);
  return (fr?`Pour ${list} : `:`For ${list}: `)+group.text;
}

function makeLogo(size){

  return '<img src="'+src+'" width="'+size+'" height="'+size+'" alt="Haut-Lac" style="display:block;object-fit:contain;pointer-events:none">';

function makeSVG(r,tid,strokeColor){
  r=Math.round(r*_colScale);
  const c=r+9,sz=(r+9)*2,circ=(2*Math.PI*r).toFixed(2),sc=strokeColor||'#1a1a18';
  const ld=Math.max(16,Math.round((r-7)*2*0.82));
  return`<div style="position:relative;width:${sz}px;height:${sz}px;flex-shrink:0">
    <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="transform:rotate(-90deg);position:absolute;top:0;left:0">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#e8e6e0" stroke-width="6"/>
      <circle id="arc-${tid}" cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${sc}" stroke-width="6"
        stroke-dasharray="${circ}" stroke-dashoffset="0" stroke-linecap="round"
        style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
    </svg>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">${makeLogo(ld)}</div>
    <div class="speaking-dot" id="speak-dot-${tid}">🔊</div>
  </div>`;}
function timerState(t){if(t.done)return'done';if(t.left<=alertSecs)return'warning';if(t.left<=ALERT_30)return'near30';return'normal';}
function setArc(tid,left,total,state,r){
  const el=document.getElementById('arc-'+tid);if(!el)return;
  // Use the scaled radius that matches the actual SVG circle drawn by makeSVG
  const scaledR=Math.round(r*_colScale);
  const circ=2*Math.PI*scaledR;
  const pct=total>0?Math.max(0,Math.min(1,left/total)):0;
  el.style.strokeDasharray=circ.toFixed(2);
  el.style.strokeDashoffset=(circ*(1-pct)).toFixed(2);
  el.style.stroke={normal:'#1a1a18',near30:'#1a5abf',warning:'#c0392b',done:'#e8e6e0'}[state]||'#1a1a18';
}

let announceLang='fr';
let selectedVoice=null;
function setLang(l){
  announceLang=l;
  // Update all lang buttons (setup panel + side panel)
  ['fr','en'].forEach(code=>{
    ['lang-'+code, 'panel-lang-'+code].forEach(id=>{
      const btn=document.getElementById(id);if(!btn)return;
      const active=l===code;
      btn.style.background=active?'#3a7bd5':'#fff';
      btn.style.color=active?'#fff':'#666';
      btn.style.borderColor=active?'#3a7bd5':'#d0cdc6';
      btn.style.fontWeight=active?'500':'400';
    });
  });
  selectedVoice=null;populateVoices();
  if(_voiceSettingsOpen)buildVoiceSettingsPanel();
  if(currentTab==='voice')buildVoiceAlertsPanel();
  savePrefs();
}
function populateVoices(){
  if(!window.speechSynthesis)return;
  const voices=window.speechSynthesis.getVoices();if(!voices.length)return;
  const sel=document.getElementById('voice-select');if(!sel)return;
  const lp=announceLang==='fr'?'fr':'en';
  const filtered=voices.filter(v=>v.lang.toLowerCase().startsWith(lp));
  sel.innerHTML='<option value="">Voix par défaut</option>';
  filtered.forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=`${v.name} (${v.lang})`;sel.appendChild(o);});
  sel.onchange=()=>{const name=sel.value;selectedVoice=name?voices.find(v=>v.name===name)||null:null;};
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=populateVoices;populateVoices();}

function splitIntoChunks(text,maxLen=200){
  const sentences=text.match(/[^.!?]+[.!?]+[\s]*/g)||[text];
  const chunks=[];let current='';
  sentences.forEach(s=>{if((current+s).length>maxLen&&current.length>0){chunks.push(current.trim());current=s;}else{current+=s;}});
  if(current.trim())chunks.push(current.trim());
  return chunks.length?chunks:[text];
}
// ── SPEECH ENGINE ──
let _speechQueue=[];
let _speechBusy=false;
let _speechWatchdog=null;

function _resetSpeech(){
  _speechBusy=false;
  if(_speechWatchdog){clearTimeout(_speechWatchdog);_speechWatchdog=null;}
}

function _processQueue(){
  if(_speechBusy||_speechQueue.length===0){
    if(!_speechBusy&&_speechQueue.length===0)hideSpeaking();
    return;
  }
  if(!window.speechSynthesis)return;
  _speechBusy=true;
  const {chunks,langCode,voice,examIds,timerIds}=_speechQueue.shift();
  if(typeof showSpeaking==='function')showSpeaking(examIds||null, timerIds||null);
  _speakChunksQueued(chunks,langCode,voice,0);
}

function _speakChunksQueued(chunks,langCode,voice,idx){
  if(idx>=chunks.length){
    _resetSpeech();
    setTimeout(_processQueue,150);
    return;
  }
  if(!window.speechSynthesis){_resetSpeech();return;}
  const u=new SpeechSynthesisUtterance(chunks[idx]);
  u.lang=langCode==='en'?'en-GB':'fr-FR';
  u.rate=0.95;u.pitch=1;u.volume=1;
  if(voice)u.voice=voice;
  u.onend=()=>{
    if(_speechWatchdog){clearTimeout(_speechWatchdog);_speechWatchdog=null;}
    _speakChunksQueued(chunks,langCode,voice,idx+1);
  };
  u.onerror=()=>{_resetSpeech();hideSpeaking();setTimeout(_processQueue,150);};
  _speechWatchdog=setTimeout(()=>{_resetSpeech();hideSpeaking();setTimeout(_processQueue,150);},30000);
  try{window.speechSynthesis.speak(u);}catch(e){_resetSpeech();hideSpeaking();}
}

let _warmingUp=false;
function warmUpSpeech(){
  if(!window.speechSynthesis||_warmingUp)return;
  _warmingUp=true;
  try{
    window.speechSynthesis.cancel(); // clear any stuck state
    const u=new SpeechSynthesisUtterance('\u200B'); // zero-width space
    u.volume=0;
    u.onend=u.onerror=()=>{_warmingUp=false;};
    window.speechSynthesis.speak(u);
  }catch(e){_warmingUp=false;}
}

document.addEventListener('touchstart',warmUpSpeech,{passive:true});
document.addEventListener('mousedown',warmUpSpeech,{passive:true});
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    _resetSpeech(); // reset in case browser killed speech in background
    if(intervalId&&!paused)acquireWakeLock();
    if(typeof _audioCtx!=='undefined'&&_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume().catch(()=>{});
  }
});

function announce(text,{interrupt=false,examIds=null,timerIds=null}={}){
  if(audioMode!=='voice'||!window.speechSynthesis||!text)return;
  const voice=selectedVoice||(()=>{
    const vv=window.speechSynthesis.getVoices();
    if(announceLang==='en'){
      // Prefer British, fall back to US, then any English
      return vv.find(v=>v.lang.toLowerCase().startsWith('en-gb')&&v.localService)
          ||vv.find(v=>v.lang.toLowerCase().startsWith('en-gb'))
          ||vv.find(v=>v.lang.toLowerCase().startsWith('en-us')&&v.localService)
          ||vv.find(v=>v.lang.toLowerCase().startsWith('en'))
          ||null;
    }
    return vv.find(v=>v.lang.toLowerCase().startsWith('fr')&&v.localService)
        ||vv.find(v=>v.lang.toLowerCase().startsWith('fr'))
        ||null;
  })();
  const chunks=splitIntoChunks(text);
  if(interrupt){
    _speechQueue=[];
    try{window.speechSynthesis.cancel();}catch(e){}
    _resetSpeech();
    hideSpeaking();
  }

function joinList(arr,fr){if(arr.length===1)return arr[0];const conj=fr?' et ':' and ';return arr.slice(0,-1).join(', ')+conj+arr[arr.length-1];}

function buildAlertText(minutes, timerContexts){
  const fr=announceLang==='fr';
  const minText=fr?(minutes<=1?'une minute':`${minutes} minutes`):(minutes<=1?'one minute':`${minutes} minutes`);
  const base=fr?`Il reste ${minText}.`:`${minutes<=1?'One minute':minText} remaining.`;
  if(!timerContexts||timerContexts.length===0)return base;

  const runningExams=exams.filter(e=>e.status==='running');
  const multipleExams=runningExams.length>1;
  const totalActiveTimers=runningExams.reduce((n,e)=>n+e.timers.filter(t=>!t.done).length,0);
  const hasExtra=timerContexts.some(c=>c.isExtra);
  // No prefix needed if all timers are alerting and none are extra
  if(!multipleExams&&!hasExtra)return base;
  if(timerContexts.length===totalActiveTimers&&!hasExtra)return base;

  // Build prefix: group by exam
  const examGroups={};
  timerContexts.forEach(({examTitle,timerLabel,isExtra})=>{
    if(!examGroups[examTitle])examGroups[examTitle]=[];
    if(isExtra)examGroups[examTitle].push(timerLabel);
  });
  const allExamsCovered=Object.keys(examGroups).length>=runningExams.length;

  const parts=Object.entries(examGroups).map(([title,extras])=>{
    if(allExamsCovered){
      // No exam names — only mention extra time if applicable
      return extras.length?(fr?`temps supplémentaire de ${joinList(extras.map(function(x){return fmtSpokenLabel(x,fr);}),fr)}`:`additional time of ${joinList(extras.map(function(x){return fmtSpokenLabel(x,fr);}),fr)}`):null;
    }
    if(extras.length)return fr?`${title}, temps supplémentaire de ${joinList(extras.map(function(x){return fmtSpokenLabel(x,fr);}),fr)}`:`${title}, additional time of ${joinList(extras.map(function(x){return fmtSpokenLabel(x,fr);}),fr)}`;
    return title;
  }).filter(Boolean);

  if(parts.length===0)return base;
  const prefix=fr
    ?(parts.every(p=>p.startsWith('temps'))?`Pour le ${joinList(parts,fr)} : `:`Pour ${joinList(parts,fr)} : `)
    :`For ${joinList(parts,fr)}: `;
  return prefix+base;
}

function buildCombinedEndText(endBatch){

// Render a template to a string, replacing tokens with runtime values
// timer: specific timer to use for duration (if null, uses Principal)
function renderTemplate(event,{exam=null,minutes=null,now=null,timer=null}={}){
  const segs=getTemplate(event);
  const fr=announceLang==='fr';
  const timerForDur=timer||(exam?exam.timers.find(t=>t.label==='Principal'):null);
  const dur=timerForDur?fmtSpoken(timerForDur.total||0,fr):'';
  const readingDur=exam?fmtSpoken(exam.readingTotal||0,fr):'';
  const heure=now?(fr?(now.getHours()+' heures '+now.getMinutes().toString().padStart(2,'0')):(now.getHours()+':'+ now.getMinutes().toString().padStart(2,'0'))):'';
  const restant=minutes!=null?fmtSpoken(minutes*60,fr):'';
  return segs.map(seg=>{
    if(seg.t!=null)return seg.t;
    if(seg.k==='duree')return dur;
    if(seg.k==='heure')return heure;
    if(seg.k==='restant')return restant;
    if(seg.k==='lecture')return readingDur;
    return '';
  }).join('').trim();
}

// Build announcement text using templates (non-IB)
function buildAnnouncementBase(event,options={}){

// Group exams (or exam+timer pairs) by their rendered announcement text.
// Returns [{text, exams[], timers[]}] — one entry per unique text.
// For events with {duree} token, groups by each timer's text separately.
// Group exams by their rendered announcement text using only the Principal timer duration.
// If no Principal, falls back to first active timer. Extra-time timers don't get
// separate start/end announcements — only the Principal duration is announced.
function groupByText(event, examList, now){
  const groups={};
  examList.forEach(exam=>{
    const principal=exam.timers.find(t=>t.label==='Principal'&&!t.done)
      ||exam.timers.find(t=>!t.done)
      ||exam.timers[0];
    const text=buildAnnouncementBase(event,{exam,now,timer:principal});
    if(!text)return;
    if(!groups[text])groups[text]={text,exams:[]};
    groups[text].exams.push(exam);
  });
  return Object.values(groups);
}

// Build grouped announcements for a non-IB event.
// Returns [{text, examIds, timerIds}] — one entry per unique announcement text.
function buildGroupedAnnouncements(event, examList, now, allActiveExams){
  const fr=announceLang==='fr';
  const groups=groupByText(event, examList, now);

  return groups.map(group=>{
    const needsPrefix=group.exams.length<allActiveExams.length;
    let text=group.text;
    if(needsPrefix){
      const list=joinList(group.exams.map(e=>e.title||('Épreuve '+e.id)),fr);
      text=(fr?`Pour ${list} : `:`For ${list}: `)+group.text;
    }
    return {
      text,
      examIds:group.exams.map(e=>e.id),
      timerIds:null
    };
  });
}

// Parse a ratio string like "25%", "1/3", "33.3%", "0.25" → decimal
function parseRatio(str){
  if(!str)return null;
  str=String(str).trim();
  // fraction like "1/3"
  const frac=str.match(/^(\d+\.?\d*)\s*\/\s*(\d+\.?\d*)$/);
  if(frac)return parseFloat(frac[1])/parseFloat(frac[2]);
  // percentage like "25%" or "33.3%"
  const pct=str.match(/^(\d+\.?\d*)%$/);
  if(pct)return parseFloat(pct[1])/100;
  // plain decimal
  const num=parseFloat(str);
  if(!isNaN(num))return num>1?num/100:num; // treat >1 as percent
  return null;
}

// ── BUILD EXAM OBJECT ──
function buildExamObj(def, readingOnOverride, readingMinsOverride){
  const base=getExamBase(def.id);if(base<=0)return null;
  const title=(document.getElementById('inp-title-'+def.id)?.value||'').trim()||('Examen '+(exams.length+1));
  const rOn = readingOnOverride !== undefined ? readingOnOverride : (def.readingOn !== false);
  const rMins = readingMinsOverride !== undefined ? readingMinsOverride : (parseInt(document.getElementById('inp-reading')?.value)||5);
  const rTotal = rMins*60;

  // Read current p1/p2 values from DOM if available
  const p1str=(document.getElementById('inp-p1-'+def.id)?.value||def.p1||'25%');
  const p2str=(document.getElementById('inp-p2-'+def.id)?.value||def.p2||'50%');
  const r1=parseRatio(p1str)||0.25;
  const r2=parseRatio(p2str)||0.50;
  const l1=fmtPercent(r1, p1str);
  const l2=fmtPercent(r2, p2str);

  const timers=[];let ri=0;
  if(def.tog.main){
    const total=base;
    timers.push({id:`${def.id}-main`,label:'Principal',total,left:total,done:false,
      alerted:false,alerted30:false,endAlerted:false,ratio:1,r:BASE_RADII[Math.min(ri++,2)]});
  }
  if(def.tog.t25){
    const total=Math.round(base*(1+r1));
    timers.push({id:`${def.id}-t25`,label:'+'+l1,total,left:total,done:false,
      alerted:false,alerted30:false,endAlerted:false,ratio:1+r1,r:BASE_RADII[Math.min(ri++,2)]});
  }
  if(def.tog.t50){
    const total=Math.round(base*(1+r2));
    timers.push({id:`${def.id}-t50`,label:'+'+l2,total,left:total,done:false,
      alerted:false,alerted30:false,endAlerted:false,ratio:1+r2,r:BASE_RADII[Math.min(ri++,2)]});
  }
  // Read ibType from DOM (may have changed since addExam)
  const ibTypeSel=document.getElementById('inp-ibtype-'+def.id);
  if(ibTypeSel)def.ibType=ibTypeSel.value;
  return{id:def.id,title,timers,status:'waiting',readingOn:rOn,readingTotal:rTotal,readingLeft:rTotal,readingAlerted:false,ibType:def.ibType||'ns'};
}

// Format a ratio for display, preserving the original input format
function fmtPercent(r, originalStr){
  if(originalStr){
    const s=originalStr.trim();
    // If input was a fraction (contains /), keep as fraction
    if(s.includes('/'))return s;
    // If input was a percentage, show as percentage
    if(s.includes('%')){
      const pct=r*100;
      const rounded=Math.round(pct*10)/10;
      return (Number.isInteger(rounded)?rounded:rounded.toFixed(1))+'%';
    }
    // Plain decimal input — show as percentage
    const pct=r*100;
    const rounded=Math.round(pct*10)/10;
    return (Number.isInteger(rounded)?rounded:rounded.toFixed(1))+'%';
  }
  // Fallback: percentage
  const pct=r*100;
  const rounded=Math.round(pct*10)/10;
  return (Number.isInteger(rounded)?rounded:rounded.toFixed(1))+'%';
}

  document.getElementById('top-bar').classList.add('visible');
  document.getElementById('quit-btn').classList.add('visible');
  document.getElementById('live-clock').style.display='block';
  document.getElementById('live-clock').textContent=nowClock();

  buildColumns();
  scaleColumns();
  refreshGlobalControls();

  if(intervalId)clearInterval(intervalId);
  if(clockInterval)clearInterval(clockInterval);
  intervalId=setInterval(tick,1000);
  clockInterval=setInterval(tickClock,1000);
  acquireWakeLock();
}

// ── LAUNCH A SINGLE EXAM ──
function launchExam(examId){
  const exam=exams.find(e=>e.id===examId);
  if(!exam||exam.status!=='waiting')return;
  if(exam.readingOn){
    exam.status='reading';
    renderExamCol(exam);
    setTimeout(()=>startReadingSound([exam]),100);
  } else {
    exam.status='running';
    renderExamCol(exam);
    setTimeout(()=>startExamSound([exam]),100);
  }
  ensureInterval();
  refreshGlobalControls();
}

// ── LAUNCH ALL WAITING ──
function launchAllWaiting(){
  const waiting=exams.filter(e=>e.status==='waiting');
  const toRead=[], toRun=[];
  waiting.forEach(e=>{
    if(e.readingOn){e.status='reading';renderExamCol(e);toRead.push(e);}
    else{e.status='running';renderExamCol(e);toRun.push(e);}
  });
  // Single announcement per group, no per-exam staggering
  if(toRead.length>0) setTimeout(()=>startReadingSound(toRead),100);
  if(toRun.length>0)  setTimeout(()=>startExamSound(toRun), toRead.length>0?1800:100);
  ensureInterval();
  refreshGlobalControls();
}

function ensureInterval(){
  clearInterval(intervalId);
  intervalId=setInterval(tick,1000);
}

// ── BUILD / RENDER COLUMNS ──
function buildColumns(){
  document.getElementById('exams-columns').innerHTML=exams.map(e=>colHTML(e)).join('');
  exams.forEach(e=>{
    if(e.status==='running')e.timers.forEach(t=>setArc(t.id,t.left,t.total,timerState(t),t.r));
  });
  applyFullscreenSizes(!!document.fullscreenElement);
}

function renderExamCol(exam){
  const col=document.getElementById('col-'+exam.id);
  if(!col)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=colHTML(exam);
  col.replaceWith(tmp.firstElementChild);
  if(exam.status==='running')exam.timers.forEach(t=>setArc(t.id,t.left,t.total,timerState(t),t.r));
  applyFullscreenSizes(!!document.fullscreenElement);
  scaleColumns();
}

// ── GLOBAL CONTROLS ──
function refreshGlobalControls(){
  const waiting=exams.filter(e=>e.status==='waiting');
  const container=document.getElementById('global-controls');
  if(!container)return;
  let btn=document.getElementById('start-all-waiting-btn');
  if(waiting.length>0){

      btn=document.createElement('button');

    }

// ── REFRESH ──
function refreshTimers(){
  exams.forEach(exam=>{
    if(exam.status==='reading'){
      const rd=document.getElementById('colread-disp-'+exam.id);
      if(rd){rd.textContent=fmtTime(exam.readingLeft);rd.className='col-reading-disp'+(exam.readingLeft<=alertSecs?' warning':'');}
    } else if(exam.status==='running'){
      exam.timers.forEach(timer=>{
        const state=timerState(timer);
        const blk=document.getElementById('blk-'+timer.id);if(blk)blk.className='timer-block'+(timer.done?' done-blk':'');
        const disp=document.getElementById('disp-'+timer.id);
        if(disp){disp.style.color='';disp.className='t-display'+(state==='warning'?' warning':state==='near30'?' near30':'')+(timer.done?' done-txt':'');disp.textContent=fmtTime(timer.left);}
        // Update total display (changes when adjustExamTime is called)
        const totalEl=document.getElementById('total-'+timer.id);
        if(totalEl)totalEl.textContent=fmtHuman(timer.total);
        const lbl=document.getElementById('lbl-'+timer.id);
        if(lbl)lbl.innerHTML=timer.label+(timer.done?`<span class="done-badge">${t('done')}</span>`:'');
        setArc(timer.id,timer.left,timer.total,state,timer.r);
        refreshMilestones(timer);
      });
    }
  });
  if(panelOpen&&currentTab==='adjust') refreshAdjustLiveValues();
}

// Update only the live time values in the adjust panel without rebuilding DOM
function refreshAdjustLiveValues(){
  exams.forEach(exam=>{
    if(exam.status==='reading'){
      const el=document.getElementById('adj-live-read-'+exam.id);
      if(el)el.textContent=fmtTime(exam.readingLeft);
    } else if(exam.status==='running'){
      exam.timers.forEach(t=>{
        const el=document.getElementById('adj-live-'+t.id);
        if(el)el.textContent=fmtTime(t.left);
      });
    }
  });
}

// ── TICK ──
function tick(){
  if(paused)return;
  const alert30Batch=[], alertBatch=[], endBatch=[];
  const readingEndBatch=[], examStartBatch=[];

  exams.forEach(exam=>{
    if(examPausedSet.has(exam.id))return; // individually paused
    if(exam.status==='reading'){
      exam.readingLeft--;
      if(exam.readingLeft<=0){
        exam.status='running';exam.readingLeft=0;
        renderExamCol(exam);
        readingEndBatch.push(exam);
        examStartBatch.push(exam);
        refreshGlobalControls();
      }
    } else if(exam.status==='running'){
      exam.timers.forEach(t=>{
        if(t.done)return;
        if(t.left>0){
          t.left--;
          const isExtra=t.label!=='Principal';
          if(t.left<=ALERT_30&&!t.alerted30){
            t.alerted30=true;
            alert30Batch.push({exam,examTitle:exam.title,timerLabel:t.label,isExtra,minutes:Math.round(t.left/60)});
          }
          if(t.left<=alertSecs&&!t.alerted){
            t.alerted=true;
            alertBatch.push({exam,examTitle:exam.title,timerLabel:t.label,isExtra,minutes:Math.round(t.left/60)});
          }
          if(t.left===0&&!t.endAlerted){t.endAlerted=true;t.done=true;endBatch.push({exam,timer:t});}
        }
      });
    }
  });

  // Reading end + exam start
  if(readingEndBatch.length>0){
    endReadingSound(readingEndBatch);
    startExamSound(examStartBatch);
  }

  // Alert 30
  if(alert30Batch.length>0){
    const eIds=[...new Set(alert30Batch.map(x=>x.exam.id))];
    const timerIds=alert30Batch.map(x=>{const tm=x.exam.timers.find(t=>t.label===x.timerLabel);return tm?tm.id:null;}).filter(Boolean);
    if(ibMode&&audioMode==='voice'){
      const examList=[...new Set(alert30Batch.map(x=>x.exam))];
      const now=new Date(),allR=exams.filter(e=>e.status==='running');
      ibGroupAnnouncements(examList,'alert30',now).forEach(g=>announce(ibBuildAnnouncement(g,allR),{interrupt:true,examIds:eIds,timerIds}));
    } else if(audioMode==='voice'){
      const txt=buildAlertTemplateText('alert30',alert30Batch[0].minutes,alert30Batch);
      if(txt)announce(txt,{interrupt:true,examIds:eIds,timerIds});
    }
    if(audioMode!=='silence'){beep(660,.14);setTimeout(()=>beep(780,.14),170);}
  }
  if(alertBatch.length>0){
    const delay=alert30Batch.length>0?3000:0;
    setTimeout(()=>{
      const eIds=[...new Set(alertBatch.map(x=>x.exam.id))];
      const timerIds=alertBatch.map(x=>{const tm=x.exam.timers.find(t=>t.label===x.timerLabel);return tm?tm.id:null;}).filter(Boolean);
      if(ibMode&&audioMode==='voice'){
        const examList=[...new Set(alertBatch.map(x=>x.exam))];
        const now=new Date(),allR=exams.filter(e=>e.status==='running');
        ibGroupAnnouncements(examList,'alert5',now).forEach(g=>announce(ibBuildAnnouncement(g,allR),{interrupt:true,examIds:eIds,timerIds}));
      } else if(audioMode==='voice'){
        const txt=buildAlertTemplateText('alert5',alertBatch[0].minutes,alertBatch);
        if(txt)announce(txt,{interrupt:true,examIds:eIds,timerIds});
      }
      if(audioMode!=='silence'){beep(880,.18);setTimeout(()=>beep(1100,.18),220);}
    },delay);
  }
  if(endBatch.length>0){
    const delay=(readingEndBatch.length||alert30Batch.length||alertBatch.length)?4000:0;
    setTimeout(()=>{
      const eIds=[...new Set(endBatch.map(x=>x.exam.id))];
      const timerIds=endBatch.map(x=>x.timer.id);
      if(ibMode&&audioMode==='voice'){
        const examList=[...new Set(endBatch.map(x=>x.exam))];
        const now=new Date(),allR=exams.filter(e=>e.status==='running');
        ibGroupAnnouncements(examList,'end',now).forEach(g=>announce(ibBuildAnnouncement(g,allR),{interrupt:true,examIds:eIds,timerIds}));
      } else if(audioMode==='voice'){
        const txt=buildEndTemplateText(endBatch);
        if(txt)announce(txt,{interrupt:true,examIds:eIds,timerIds});
      }
      if(audioMode!=='silence'){beep(660,.2);setTimeout(()=>beep(880,.2),250);setTimeout(()=>beep(1100,.35),500);}
    },delay);
  }

  refreshTimers();
  const anyActive=exams.some(e=>e.status==='reading'||(e.status==='running'&&e.timers.some(t=>!t.done)));
  if(!anyActive&&exams.every(e=>e.status!=='waiting'))clearInterval(intervalId);
}

// ── CONTROLS ──
function syncPauseButtons(){
  const btn=document.getElementById('btn-pause'),lbl=document.getElementById('pause-label'),ico=document.getElementById('pause-icon');
  if(!btn)return;
  if(paused){lbl.textContent=t('resume');btn.classList.remove('primary');ico.innerHTML='<polygon points="5 3 19 12 5 21" style="fill:currentColor;stroke:none"/>';}
  else{lbl.textContent=t('pause');btn.classList.add('primary');ico.innerHTML='<rect x="6" y="4" width="4" height="16" style="fill:currentColor;stroke:none"/><rect x="14" y="4" width="4" height="16" style="fill:currentColor;stroke:none"/>';}
}
function togglePause(){
  paused=!paused;
  syncPauseButtons();
  if(paused){
    releaseWakeLock();
    // Pause any ongoing speech
    if(window.speechSynthesis)window.speechSynthesis.pause();
  } else {
    acquireWakeLock();
    if(window.speechSynthesis)window.speechSynthesis.resume();
  }
}

function toggleExamPause(examId){
  const isPaused=examPausedSet.has(examId);
  if(isPaused) examPausedSet.delete(examId);
  else examPausedSet.add(examId);
  const btn=document.getElementById('col-pause-'+examId);
  const lbl=document.getElementById('col-pause-label-'+examId);
  const ico=document.getElementById('col-pause-icon-'+examId);
  if(!btn)return;
  const nowPaused=examPausedSet.has(examId);
  if(nowPaused){
    btn.style.background='#eaf1fb';
    if(lbl)lbl.textContent=t('resume');
    if(ico)ico.innerHTML='<polygon points="5 3 19 12 5 21" style="fill:currentColor;stroke:none"/>';
  } else {
    btn.style.background='';
    if(lbl)lbl.textContent=t('pause');
    if(ico)ico.innerHTML='<rect x="6" y="4" width="4" height="16" style="fill:currentColor;stroke:none"/><rect x="14" y="4" width="4" height="16" style="fill:currentColor;stroke:none"/>';
  }
}

function adjustExamTime(examId,d){
  const exam=exams.find(e=>e.id===examId);if(!exam||exam.status!=='running')return;
  exam.timers.forEach(t=>{
    if(t.done)return;
    const scaled=Math.round(d*t.ratio);
    // Change both left and total — this shifts the endpoint while preserving elapsed time
    t.left=Math.max(0,t.left+scaled);
    t.total=Math.max(t.left,t.total+scaled);
    if(t.left>alertSecs)t.alerted=false;
    if(t.left>ALERT_30)t.alerted30=false;
  });
  refreshTimers();
}

  }
}
function panelToggleAlert30(){

function removeRunningExam(examId){
  const exam=exams.find(e=>e.id===examId);if(!exam)return;
  if(exam.status!=='waiting'){
    // Show inline confirmation in the column instead of confirm()
    const col=document.getElementById('col-'+examId);
    if(!col)return;
    // If already showing confirm, cancel it
    if(col.querySelector('.col-confirm')){
      col.querySelector('.col-confirm').remove();
      return;
    }
    const div=document.createElement('div');
    div.className='col-confirm';
    div.style.cssText='margin-top:8px;padding:10px 12px;background:#fdf0f0;border:1px solid #e0a0a0;border-radius:8px;font-size:12px;color:#a03030';
    div.innerHTML=`<div style="margin-bottom:8px;font-weight:500">Supprimer cet examen ?</div>
      <div style="display:flex;gap:6px">
        <button onclick="confirmRemoveRunningExam(${examId})" style="flex:1;padding:5px;border:none;border-radius:6px;background:#c0392b;color:#fff;cursor:pointer;font-size:12px;font-family:inherit">Supprimer</button>
        <button onclick="this.closest('.col-confirm').remove()" style="flex:1;padding:5px;border:1px solid #d0cdc6;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit">Annuler</button>
      </div>`;
    col.appendChild(div);
  } else {
    // Waiting: remove immediately, no need for confirm
    exams=exams.filter(e=>e.id!==examId);
    const col=document.getElementById('col-'+examId);if(col)col.remove();
    refreshGlobalControls();
    if(panelOpen&&currentTab==='adjust')buildAdjustPanel();
    scaleColumns();
  }
}

function confirmRemoveRunningExam(examId){
  exams=exams.filter(e=>e.id!==examId);
  const col=document.getElementById('col-'+examId);if(col)col.remove();
  refreshGlobalControls();
  if(panelOpen&&currentTab==='adjust')buildAdjustPanel();
  scaleColumns();
}

function adjTimer(tid,d){
  let found=null;exams.forEach(exam=>exam.timers.forEach(t=>{if(t.id===tid)found={exam,t};}));
  if(!found||found.t.done||found.exam.status!=='running')return;
  const t=found.t;
  // Only change left — total stays fixed so circle shows proportion of total exam time used
  t.left=Math.max(0,t.left+d);
  if(t.left>alertSecs)t.alerted=false;
  if(t.left>ALERT_30)t.alerted30=false;
  const liveEl=document.getElementById('adj-live-'+tid);if(liveEl)liveEl.textContent=fmtTime(t.left);
  refreshTimers();
}
function adjReading(examId,d){
  const exam=exams.find(e=>e.id===examId);if(!exam||exam.status!=='reading')return;
  exam.readingLeft=Math.max(0,exam.readingLeft+d);
  if(d>0&&exam.readingLeft>alertSecs)exam.readingAlerted=false;
  const liveEl=document.getElementById('adj-live-read-'+examId);if(liveEl)liveEl.textContent=fmtTime(exam.readingLeft);
  const dispEl=document.getElementById('colread-disp-'+examId);if(dispEl)dispEl.textContent=fmtTime(exam.readingLeft);
}

// ── SCALE COLUMNS TO FIT ──
function sizeColumns(){
  const container=document.getElementById('exams-columns');
  if(!container)return;
  const cols=container.querySelectorAll('.exam-col');
  const n=cols.length;
  if(!n)return;

  const isFS=!!document.fullscreenElement;
  const vw=isFS?window.innerWidth:container.offsetWidth||window.innerWidth*0.9;
  const vhTotal=window.innerHeight;

  // Measure fixed elements that take space outside the columns
  const clkEl=document.getElementById('live-clock');
  const ctrlEl=document.getElementById('global-controls');
  const divEl=document.querySelector('.divider');
  const clkH=clkEl?clkEl.offsetHeight+parseInt(getComputedStyle(clkEl).marginBottom||0):50;
  const ctrlH=ctrlEl?ctrlEl.offsetHeight+16:60;
  const divH=divEl?divEl.offsetHeight+16:20;

  // Available height for the columns themselves
  const cardPad=isFS?0:64; // .card padding top+bottom
  const availH=vhTotal - clkH - ctrlH - divH - cardPad;

  const colW=vw/n;
  const widthScale=colW/280;
  const heightScale=availH/480; // baseline column content height
  const maxScale=isFS?2.2:1.8;
  const s=Math.max(0.35, Math.min(widthScale, heightScale, maxScale));

  _colScale=s;
  container.style.setProperty('--cs', s.toString());

  if(Math.abs(s - (_lastScale||0)) > 0.04){
    _lastScale=s;
    refreshSVGSizes();
  }

  // Scale the clock too in fullscreen
  if(isFS){
    const clkSize=clamp(Math.round(36*s),24,90);
    if(clkEl)clkEl.style.fontSize=clkSize+'px';
  } else {
    if(clkEl)clkEl.style.fontSize='';
  }
}
let _lastScale=1;
function refreshSVGSizes(){
  // Re-render each timer's SVG at the current scale
  exams.forEach(exam=>{
    exam.timers.forEach(timer=>{
      const r=Math.round(timer.r*_colScale);
      const oldSvg=document.getElementById('arc-'+timer.id);
      if(!oldSvg)return;
      const wrapper=oldSvg.closest('div[style*="position:relative"]');
      if(!wrapper)return;
      const newHtml=makeSVG(timer.r,timer.id);
      const tmp=document.createElement('div');
      tmp.innerHTML=newHtml;
      const newWrapper=tmp.firstElementChild;
      if(newWrapper)wrapper.replaceWith(newWrapper);
    });
  });
  // Re-apply arc states
  refreshTimers();
}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

// ── WAKE LOCK ──
async function acquireWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{
    wakeLock=await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release',()=>{wakeLock=null;});
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}
}
// Re-acquire after tab becomes visible again (iOS/mobile releases on hide)
// ── QUIT ──
function confirmQuit(){
  if(!confirm(t('confirmQuitMsg')))return;
  if(intervalId)clearInterval(intervalId);if(clockInterval)clearInterval(clockInterval);
  releaseWakeLock();
  examPausedSet.clear();
  paused=false;closePanel();
  document.getElementById('timer-view').classList.remove('active');
  document.getElementById('live-clock').style.display='none';
  document.getElementById('setup-panel').style.display='block';
  document.getElementById('top-bar').classList.remove('visible');
  document.getElementById('quit-btn').classList.remove('visible');
  if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
  syncPauseButtons();
}
